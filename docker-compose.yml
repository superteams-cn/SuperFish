services:
  neo4j:
    image: neo4j:5.26-community
    container_name: superfish-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-superfish_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-superfish_neo4j}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: superfish-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  superfish:
    image: ghcr.io/superteams-cn/superfish:latest
    # 加速镜像（如拉取缓慢可替换上方地址）
    # image: ghcr.nju.edu.cn/superteams-cn/superfish:latest
    container_name: superfish
    env_file:
      - .env
    environment:
      # 容器内通过服务名访问 Redis（覆盖 .env 中的 localhost 默认值）
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/uploads:/app/apps/api/uploads

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
