# nginx：托管前端静态产物 + 反向代理 /api 到多个 API 副本（Docker DNS 轮询负载均衡）。
server {
    listen 80;
    server_name _;

    # ---- 前端静态站点（Vite 构建产物）----
    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由回退：未命中静态文件的路径交给前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- API 反向代理 ----
    # 用变量 + Docker 内嵌 DNS(127.0.0.11) 每次请求重解析 `api`，从而在 3 个 API 副本间轮询；
    # 若写死 upstream，nginx 仅启动时解析一次会把请求钉在单个副本上。
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream api;
        proxy_pass http://$api_upstream:5001$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 采访流式（SSE）：关闭缓冲、用 HTTP/1.1、放宽读超时，保证逐 token 实时下发
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 上传体积放宽（文档/语料上传）
    client_max_body_size 64m;
}
