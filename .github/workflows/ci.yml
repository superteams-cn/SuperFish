name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: 前端 (lint / typecheck / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 格式检查
        run: pnpm format:check
      - name: ESLint
        run: pnpm --filter @superfish/web lint
      - name: 类型检查
        run: pnpm --filter @superfish/web typecheck
      - name: 单元测试
        run: pnpm --filter @superfish/web test
      - name: 构建
        run: pnpm --filter @superfish/web build

  api:
    name: 后端 (ruff / pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - name: 安装 uv
        uses: astral-sh/setup-uv@v4
      - name: 安装 Python 与依赖
        run: uv sync --frozen
      - name: Ruff 检查
        run: uv run ruff check app
      - name: Ruff 格式检查
        run: uv run ruff format app --check
      - name: pytest
        run: uv run pytest
